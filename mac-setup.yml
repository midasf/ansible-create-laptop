---
- name: Mac Setup
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    homebrew_packages:
      - zsh
      - git
      - awscli
      - tfenv
      - kubectl
      - helm
      - k9s
      - kubectx
      - aws-vault
      - jq
      - yq
      - gh
      - pre-commit
      - anomalyco/tap/opencode
      - ansible
      - nmap
      - ripgrep
      - eksctl
      - awslogs
      - sops
      - fzf
      - rectangle

    homebrew_cask_packages:
      - visual-studio-code
      - iterm2
      - firefox
      - lens
      - obsidian

    vscode_extensions:
      - Anthropic.claude-code
      - ms-azuretools.vscode-containers
      - ms-vscode-remote.remote-containers
      - ms-azuretools.vscode-docker
      - github.vscode-github-actions
      - hashicorp.terraform
      - ms-kubernetes-tools.vscode-kubernetes-tools
      - redhat.vscode-yaml
      - checkmarx.ast-results

    mas_apps:
      - { id: 937984704, name: "Amphetamine" }

    computer_name: "midas-macbook"

    precommit_global_config_path: '{{ ansible_facts["env"]["HOME"] }}/.pre-commit-config.yaml'

  tasks:

    # ── Homebrew ────────────────────────────────────────────────────────────────

    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Homebrew
      ansible.builtin.shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_check.stat.exists
      changed_when: true

    - name: Update Homebrew
      community.general.homebrew:
        update_homebrew: true
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    # ── CLI packages ─────────────────────────────────────────────────────────────

    - name: Install Homebrew packages
      community.general.homebrew:
        name: "{{ item }}"
        state: present
      loop: "{{ homebrew_packages }}"
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    # ── GUI / Cask apps ──────────────────────────────────────────────────────────

    - name: Install Homebrew Cask apps
      community.general.homebrew_cask:
        name: "{{ item }}"
        state: present
        install_options: "adopt"
      loop: "{{ homebrew_cask_packages }}"
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    - name: Check if Docker Desktop is already installed via brew
      ansible.builtin.command: brew list --cask docker
      register: docker_brew_check
      failed_when: false
      changed_when: false
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    - name: Create /usr/local/cli-plugins for Docker
      ansible.builtin.file:
        path: /usr/local/cli-plugins
        state: directory
        mode: '0755'
      become: true
      when: docker_brew_check.rc != 0

    - name: Install Docker Desktop (only if not already present)
      community.general.homebrew_cask:
        name: docker
        state: present
      when: docker_brew_check.rc != 0
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    # ── Mac App Store ────────────────────────────────────────────────────────────

    - name: Install mas (Mac App Store CLI)
      community.general.homebrew:
        name: mas
        state: present
      environment:
        PATH: '/opt/homebrew/bin:{{ ansible_facts["env"]["PATH"] }}'

    - name: Check if signed into the App Store
      ansible.builtin.command: mas account
      register: mas_account_check
      failed_when: false
      changed_when: false

    - name: Warn if not signed into the App Store
      ansible.builtin.debug:
        msg: "WARNING: Not signed into the Mac App Store — skipping MAS installs. Sign in via the App Store app and re-run the playbook."
      when: mas_account_check.rc != 0

    - name: Install Mac App Store apps
      ansible.builtin.command: mas install {{ item.id }}
      loop: "{{ mas_apps }}"
      loop_control:
        label: "{{ item.name }}"
      register: mas_result
      changed_when: "'already installed' not in mas_result.stdout"
      failed_when: false
      when: mas_account_check.rc == 0

    # ── VSCode extensions ────────────────────────────────────────────────────────

    - name: Install VSCode extensions
      ansible.builtin.command: code --install-extension {{ item }} --force
      loop: "{{ vscode_extensions }}"
      environment:
        PATH: '/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts["env"]["PATH"] }}'
      register: vscode_ext_result
      changed_when: "'already installed' not in vscode_ext_result.stdout"

    # ── Pre-commit (global) ──────────────────────────────────────────────────────

    - name: Write global pre-commit config
      ansible.builtin.copy:
        dest: '{{ precommit_global_config_path }}'
        mode: preserve
        content: |
          repos:
            - repo: https://github.com/pre-commit/pre-commit-hooks
              rev: v6.0.0
              hooks:
                - id: trailing-whitespace
                - id: end-of-file-fixer
                - id: detect-aws-credentials
                  args: ['--allow-missing-credentials']
                - id: detect-private-key

            - repo: https://github.com/antonbabenko/pre-commit-terraform
              rev: v1.105.0
              hooks:
                - id: terraform_fmt
                - id: terraform_validate

            - repo: https://github.com/compilerla/conventional-pre-commit
              rev: v4.4.0
              hooks:
                - id: conventional-pre-commit
                  stages: [commit-msg]

    - name: Set pre-commit global config path in git
      community.general.git_config:
        name: core.hooksPath
        scope: global
        value: '{{ ansible_facts["env"]["HOME"] }}/.git-hooks'

    - name: Create global git hooks directory
      ansible.builtin.file:
        path: '{{ ansible_facts["env"]["HOME"] }}/.git-hooks'
        state: directory
        mode: '0755'

    - name: Install pre-commit hook script globally
      ansible.builtin.copy:
        dest: '{{ ansible_facts["env"]["HOME"] }}/.git-hooks/pre-commit'
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          pre-commit run --config {{ precommit_global_config_path }} --hook-stage pre-commit

    - name: Install commit-msg hook script globally
      ansible.builtin.copy:
        dest: '{{ ansible_facts["env"]["HOME"] }}/.git-hooks/commit-msg'
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          pre-commit run --config {{ precommit_global_config_path }} --hook-stage commit-msg --commit-msg-filename "$1"


    # ── macOS system settings ────────────────────────────────────────────────────

    - name: Set computer name
      ansible.builtin.hostname:
        name: "{{ computer_name }}"
      become: true

    - name: Set HostName
      ansible.builtin.command: scutil --set HostName "{{ computer_name }}"
      become: true
      changed_when: false

    - name: Set LocalHostName
      ansible.builtin.command: scutil --set LocalHostName "{{ computer_name }}"
      become: true
      changed_when: false

    - name: Enable fast key repeat
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: KeyRepeat
        type: int
        value: 2

    - name: Set short initial key repeat delay
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: InitialKeyRepeat
        type: int
        value: 15

    - name: Disable autocorrect
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticSpellingCorrectionEnabled
        type: bool
        value: false

    - name: Disable autocapitalize
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticCapitalizationEnabled
        type: bool
        value: false

    - name: Disable smart quotes
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticQuoteSubstitutionEnabled
        type: bool
        value: false

    - name: Disable smart dashes
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticDashSubstitutionEnabled
        type: bool
        value: false

    - name: Show hidden files in Finder
      community.general.osx_defaults:
        domain: com.apple.finder
        key: AppleShowAllFiles
        type: bool
        value: true

    - name: Show all filename extensions
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleShowAllExtensions
        type: bool
        value: true

    - name: Show path bar in Finder
      community.general.osx_defaults:
        domain: com.apple.finder
        key: ShowPathbar
        type: bool
        value: true

    - name: Disable .DS_Store on network volumes
      community.general.osx_defaults:
        domain: com.apple.desktopservices
        key: DSDontWriteNetworkStores
        type: bool
        value: true

    - name: Show battery percentage in menu bar (Apple Silicon)
      ansible.builtin.command: >
        defaults write com.apple.controlcenter "NSStatusItem Visible BatteryPercent" -bool true
      changed_when: false

    - name: Set screenshots folder to ~/Screenshots
      block:
        - name: Create Screenshots directory
          ansible.builtin.file:
            path: '{{ ansible_facts["env"]["HOME"] }}/Screenshots'
            state: directory
            mode: '0755'
        - name: Set screenshot save location
          community.general.osx_defaults:
            domain: com.apple.screencapture
            key: location
            type: string
            value: '{{ ansible_facts["env"]["HOME"] }}/Screenshots'

    - name: Autohide the Dock
      community.general.osx_defaults:
        domain: com.apple.dock
        key: autohide
        type: bool
        value: true

    - name: Restart Dock to apply changes
      ansible.builtin.command: killall Dock
      changed_when: false

    - name: Restart Finder to apply changes
      ansible.builtin.command: killall Finder
      changed_when: false
